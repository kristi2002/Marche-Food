name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: marche_food_test
          POSTGRES_USER: marche
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, zip, gd
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install JS dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Run test suite (SQLite in-memory, per phpunit.xml)
        run: php artisan test

      # The unit + feature suite uses the in-memory SQLite driver defined in
      # phpunit.xml, so the Postgres service above is available for any future
      # integration tests that need the production driver.
